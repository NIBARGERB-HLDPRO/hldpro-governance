worker:
  model_id: mlx-community/Qwen3-14B-4bit
  model_family: qwen
  large_on_demand_candidates:
    qwen3.6-35b-a3b-4bit:
      model_id: mlx-community/Qwen3.6-35B-A3B-4bit
      model_family: qwen
      mem_estimate_gb: 24
      runtime: mlx
      residency: on_demand
      role: worker-lam-large
      placement_note: Mac M5 Pro 48 GB; load only when other large on-demand models are unloaded
shadow_critic:
  model_id: mlx-community/gemma-4-26b-a4b-4bit
  model_family: gemma
  authority: ab_shadow_only
  role: critic-lam-shadow
reviewer:
  authority: cloud_qa_required
  role: codex-or-claude-authoritative-qa
  note: Gemma shadow output does not satisfy reviewer or gate requirements.
guardrail:
  model_id: mlx-community/Qwen3-8B-4bit
  model_family: qwen

# MCP daemon — always-warm orchestrator (config-driven swap)
mcp:
  active: qwen3-1.7b
  models:
    qwen3-1.7b:
      model_id: mlx-community/Qwen3-1.7B-4bit
      model_family: qwen
      mem_estimate_gb: 1.1
      role_scope: [routing, intent-parsing]
    phi-4-mini:
      model_id: mlx-community/Phi-4-mini-instruct-4bit
      model_family: phi
      mem_estimate_gb: 2.7
      role_scope: [routing, intent-parsing, reviewer-lam-fallback]
  upgrade_triggers:
    - routing_error_rate_gt_5_percent_over_1_week
    - role_scope_extends_to_reviewer_lam_fallback
    - human_operator_directive

# Local Qwen micro-worker — bounded implementation only, loaded on-demand.
worker_local_micro:
  model_id: mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
  model_family: qwen
  mem_estimate_gb: 4.5
  trigger: bounded low-risk implementation chunk
  role: local micro-worker
  authority: implementation_only

runtime:
  framework: mlx
  reference: local-ai-machine/src/inference/mlx_runtime.py
