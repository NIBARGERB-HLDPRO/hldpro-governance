### 3. server.py — add som.handoff, som.chain, som.delegate

File: `services/som-mcp/src/som_mcp/server.py`

Add three new tools to `list_tools()` and implement in `call_tool()`.

**Import additions:**
```python
import uuid
import fcntl
from som_mcp.validator import validate_packet, ValidationError
from som_mcp.packet_writer import write_packet, read_packet, chain_walk
```

**som.handoff** — validate a packet and write it to `raw/packets/`
```python
inputSchema: {
    "type": "object",
    "properties": {
        "packet": {"type": "object", "description": "Full packet dict to validate and write"},
        "repo_root": {"type": "string", "description": "Absolute path to repo root (optional; auto-detected if omitted)"}
    },
    "required": ["packet"]
}
```
Implementation:
1. Call `validate_packet(arguments["packet"])` — on `ValidationError`, return `{"status": "rejected", "reason": str(e)}`
2. On pass, call `write_packet(...)` using fields from the packet dict
3. Return `{"status": "accepted", "packet_path": str(path)}`

**som.chain** — walk the parent chain from a packet_id
```python
inputSchema: {
    "type": "object",
    "properties": {
        "packet_id": {"type": "string"},
        "repo_root": {"type": "string", "description": "optional"}
    },
    "required": ["packet_id"]
}
```
Implementation: call `chain_walk(packet_id, repo_root)`, return `{"chain": [...], "depth": n}`

**som.delegate** — atomic append of a delegation record to a chain file (Change #9 — TOCTOU fix)

The TOCTOU bug: read chain file → write modified chain — another process can write between read and write.

Fix: use `fcntl.flock` for exclusive lock:
```python
import fcntl

chain_file_path = packets_dir / f"chain-{parent_packet_id}.yml"
with open(chain_file_path, "a+") as f:
    fcntl.flock(f, fcntl.LOCK_EX)
    try:
        f.seek(0)
        existing = yaml.safe_load(f.read()) or {"delegations": []}
        existing["delegations"].append({
            "delegate_packet_id": new_packet_id,
            "timestamp": datetime.utcnow().isoformat(),
        })
        f.seek(0)
        f.truncate()
        yaml.dump(existing, f, default_flow_style=False, sort_keys=False)
    finally:
        fcntl.flock(f, fcntl.LOCK_UN)
```

inputSchema:
```python
{
    "type": "object",
    "properties": {
        "parent_packet_id": {"type": "string"},
        "new_packet_id": {"type": "string"},
        "repo_root": {"type": "string", "description": "optional"}
    },
    "required": ["parent_packet_id", "new_packet_id"]
}
```

