### 2. validator.py — full implementation (7 invariants + 10 required changes)

File: `services/som-mcp/src/som_mcp/validator.py`

Replace the stub with full implementation. All invariants are structural/deterministic — no LLM calls.

**Constants block:**
```python
TIER_SEQUENCE = [1, 2, 3, 4]

# Planning floor: valid Tier-1 models only (no gpt-5.4-codex-spark — not a real model)
PLANNING_FLOOR_MODELS = {
    "anthropic": {"claude-opus-4-6", "claude-sonnet-4-6"},
    "openai":    {"gpt-5.4", "gpt-5.3-codex-spark"},
}

LAM_FAMILIES = {"lam", "mlx", "local"}  # any model family that routes through LAM

class ValidationError(Exception):
    pass
```

**Packet schema (required fields — raise ValidationError if missing, no silent defaults):**
```python
REQUIRED_FIELDS = [
    "packet_id",
    "prior",            # dict
    "next_tier",
    "actors",           # list of all prior actor identities
]
REQUIRED_PRIOR_FIELDS = ["tier", "role", "model_id", "model_family"]
REQUIRED_ACTOR_FIELDS = ["tier", "role", "model_id", "model_family"]
```

**Function signature:**
```python
def validate_packet(packet_dict: dict) -> tuple[bool, str]:
    """Returns (True, 'ok') or raises ValidationError with a descriptive message."""
```

**Invariant 1 — missing required fields (Change #7)**
Raise `ValidationError` for any missing required key. Do NOT use `dict.get(key, default)` for required schema fields.

**Invariant 2 — tier ordering (Change #3)**
- `prior.tier` must be in `TIER_SEQUENCE`
- `next_tier` must be in `TIER_SEQUENCE`
- `next_tier == prior.tier + 1` (no skipping)

**Invariant 3 — no-self-approval (Change #2)**
All actor `model_id` values in `actors` list must be pairwise distinct. Do NOT use Python chained `!=`:
```python
# WRONG: a != b != c  (allows a == c)
# RIGHT:
ids = [a["model_id"] for a in actors]
for i in range(len(ids)):
    for j in range(i + 1, len(ids)):
        if ids[i] == ids[j]:
            raise ValidationError(f"self-approval: {ids[i]} appears as multiple actors")
```

**Invariant 4 — tier sequence constrained (Change #3 continued)**
Invalid tier values (0, 5, 99, -1) must raise `ValidationError`. ONLY values in `TIER_SEQUENCE` are valid.

**Invariant 5 — planning floor (Change #4 + #5)**
- Applies to Tier 1 actors ONLY (not workers, reviewers, gates)
- For each actor where `tier == 1`: `model_id` must be in `PLANNING_FLOOR_MODELS[model_family]`
- `gpt-5.4-codex-spark` is NOT in the constants — if it appears, raise `ValidationError`

**Invariant 6 — PII floor (Change #6)**
- Check `packet_dict.get("pii_present", False)`
- If `True`: every actor in the `actors` list must have `model_family` in `LAM_FAMILIES`
- Applies at every model boundary, not just packet entry

**Invariant 7 — cross-family independence (Tier 1)**
- Among Tier 1 actors, at least two distinct `model_family` values must be present
- (Ensures drafter and reviewer are from different model families)

**Invariant 8 — LAM family diversity**
- Among LAM-lane actors (`model_family in LAM_FAMILIES`): if there are ≥ 2 LAM actors, they must not all share the same `model_id` (prevents single-model LAM chain)

**Invariant 9 — fallback log path validity (Change #8)**
- If `fallback_log_path` key is present: it must be a non-empty string AND its parent directory must exist on the filesystem
- `os.path.isdir(os.path.dirname(fallback_log_path))` must be True

**Full function outline:**
```python
def validate_packet(packet_dict: dict) -> tuple[bool, str]:
    # 1. required fields
    # 2. tier ordering
    # 3. no-self-approval (pairwise)
    # 4. tier sequence constrained
    # 5. planning floor (Tier 1 only)
    # 6. PII floor (all actors)
    # 7. cross-family independence (Tier 1)
    # 8. LAM family diversity (if ≥ 2 LAM actors)
    # 9. fallback log path validity (if present)
    return True, "ok"
```

