$schema: https://json-schema.org/draft/2020-12/schema
$id: https://hldpro.local/schemas/som-packet/v1
title: SoM Handoff Packet
description: Canonical packet for Society of Minds stage-4 deterministic handoff
type: object
required:
  - packet_id
  - prior
  - next_tier
  - standards_ref

properties:
  packet_id:
    type: string
    format: uuid
    description: "Unique identifier for this packet (UUIDv4)"

  parent_packet_id:
    type: ["string", "null"]
    format: uuid
    description: "UUID of parent packet; required if prior.tier == 1 (dual-planner)"

  prior:
    type: object
    required:
      - tier
      - role
      - model_id
      - model_family
      - timestamp
    properties:
      tier:
        type: integer
        minimum: 1
        maximum: 4
        description: "Source tier (1=dual-planner, 2=tier-2, 3=tier-3, 4=gate)"

      role:
        type: string
        enum:
          - architect-claude
          - architect-codex
          - worker
          - reviewer
          - gate
          - worker-lam
          - critic-lam
        description: "Role of sender in source tier"

      model_id:
        type: string
        description: "Model identifier (e.g., claude-opus-4, gpt-5.3-codex-spark, qwen-coder)"

      model_family:
        type: string
        enum:
          - anthropic
          - openai
          - qwen
          - gemma
          - phi
          - llama
          - mistral
        description: "Model family for cross-family validation"

      timestamp:
        type: string
        format: date-time
        description: "ISO-8601 UTC timestamp when packet was authored"

  next_tier:
    type: integer
    minimum: 1
    maximum: 4
    description: "Destination tier for this handoff"

  artifacts:
    type: array
    items:
      type: string
    description: "File paths or URLs of artifacts included in this packet"

  standards_ref:
    type: string
    description: "Reference to STANDARDS.md section (e.g., 'STANDARDS.md §Society of Minds (SoT)')"

  runbook_ref:
    type: ["string", "null"]
    description: "Optional reference to runbook URL or path"

  fallback_ladder_ref:
    type: ["string", "null"]
    description: "Optional fallback log path (must resolve under raw/model-fallbacks when present)"

  governance:
    type: object
    description: "Issue-backed dispatch controls required by the packet queue before execution"
    required:
      - issue_number
      - structured_plan_ref
      - execution_scope_ref
      - validation_commands
      - review_artifacts
      - fallback_log_ref
      - pii_mode
      - dispatch_authorized
    properties:
      issue_number:
        type: integer
        minimum: 1
        description: "GitHub issue number authorizing this packet"
      structured_plan_ref:
        type: string
        description: "Repo-relative path to the canonical structured agent cycle plan"
      execution_scope_ref:
        type: ["string", "null"]
        description: "Repo-relative path to execution scope evidence, or null when captured in the structured plan"
      validation_commands:
        type: array
        minItems: 1
        items:
          type: string
        description: "Commands required before the packet can close"
      review_artifacts:
        type: array
        minItems: 1
        items:
          type: string
        description: "Review or gate artifacts required by the packet"
      fallback_log_ref:
        type: ["string", "null"]
        description: "Fallback log path under raw/model-fallbacks, or null when no fallback occurred"
      pii_mode:
        type: string
        enum:
          - none
          - tagged
          - detected
          - lam_only
        description: "PII routing mode declared before dispatch"
      dispatch_authorized:
        type: boolean
        description: "True only after issue-backed plan approval and scope review"
      known_failure_context:
        type: array
        description: "Cited prior mistake patterns injected before worker dispatch"
        items:
          type: object
          required:
            - title
            - summary
            - source_path
            - evidence_paths
            - repeat_count
          properties:
            title:
              type: string
            summary:
              type: string
            source_path:
              type: string
            evidence_paths:
              type: array
              minItems: 1
              items:
                type: string
            repeat_count:
              type: integer
              minimum: 1
          additionalProperties: false
    additionalProperties: false

  metadata:
    type: ["object", "null"]
    description: "Optional freeform metadata dict"

additionalProperties: false
