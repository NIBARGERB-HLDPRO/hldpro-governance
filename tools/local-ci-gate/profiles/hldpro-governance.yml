profile:
  name: hldpro-governance
  description: Governance-repo local CI gate for deterministic checks and local-only reporting.
  report_root: cache/local-ci-gate/reports
  requires_dependencies:
    - python3
    - git
  changed_files:
    base_ref: origin/main
    head_ref: HEAD
    include_untracked: true
  checks:
    - id: overlord-backlog-alignment
      title: Overlord backlog issue alignment
      severity: blocker
      scope: always
      command:
        - python3
        - scripts/overlord/check_overlord_backlog_github_alignment.py

    - id: structured-agent-cycle-plans
      title: Structured agent cycle plan validation
      severity: blocker
      scope: always
      command:
        - python3
        - scripts/overlord/validate_structured_agent_cycle_plan.py
        - --root
        - .

    - id: handoff-package-integrity
      title: Handoff package integrity validation
      severity: blocker
      scope: changed
      paths:
        # Any plan update can change handoff refs or ACs; keep this trigger conservative.
        - docs/plans/
        - docs/schemas/package-handoff.schema.json
        - docs/schemas/examples/package-handoff/
        - raw/closeouts/
        - raw/cross-review/
        - raw/execution-scopes/
        - raw/handoffs/
        - raw/packets/
        - raw/validation/
        - scripts/overlord/validate_handoff_package.py
        - scripts/overlord/test_validate_handoff_package.py
      command:
        - python3
        - scripts/overlord/validate_handoff_package.py
        - --root
        - .

    - id: stage6-closeout-evidence
      title: Stage 6 closeout evidence enforcement
      severity: blocker
      scope: changed
      paths:
        - .github/
        - agents/
        - docs/
        - hooks/
        - launchd/
        - metrics/
        - raw/
        - scripts/
        - tools/local-ci-gate/
        - wiki/
        - CLAUDE.md
        - README.md
        - STANDARDS.md
        - OVERLORD_BACKLOG.md
      command:
        - python3
        - scripts/overlord/check_stage6_closeout.py
        - --root
        - .
        - --branch-name
        - "{branch_name}"
        - --changed-files-file
        - "{changed_files_file}"

    - id: governance-surface-planning
      title: Governance-surface planning gate
      severity: blocker
      scope: changed
      paths:
        - .github/
        - agents/
        - docs/
        - hooks/
        - launchd/
        - metrics/
        - raw/
        - scripts/
        - wiki/
        - OVERLORD_BACKLOG.md
      command:
        - python3
        - scripts/overlord/validate_structured_agent_cycle_plan.py
        - --root
        - .
        - --branch-name
        - "{branch_name}"
        - --changed-files-file
        - "{changed_files_file}"
        - --enforce-governance-surface

    - id: planner-boundary
      title: Planner boundary execution scope
      severity: blocker
      scope: changed
      paths:
        - CLAUDE.md
        - README.md
        - STANDARDS.md
        - OVERLORD_BACKLOG.md
        - docs/
        - raw/
        - scripts/overlord/
      command:
        - python3
        - scripts/overlord/assert_execution_scope.py
        - --scope
        - "{execution_scope}"
        - --changed-files-file
        - "{changed_files_file}"
        - --require-lane-claim

    - id: diff-hygiene
      title: Git diff whitespace hygiene
      severity: blocker
      scope: changed
      paths:
        - "*"
      command:
        - git
        - diff
        - --check

    - id: bootstrap-env-contract
      title: Bootstrap repo env contract
      severity: blocker
      scope: changed
      paths:
        - docs/ENV_REGISTRY.md
        - scripts/bootstrap-repo-env.sh
        - scripts/test_bootstrap_repo_env_contract.py
      command:
        - python3
        - scripts/test_bootstrap_repo_env_contract.py

    - id: provisioning-evidence-safety
      title: Secret provisioning evidence safety
      severity: blocker
      scope: changed
      paths:
        - STANDARDS.md
        - docs/ENV_REGISTRY.md
        - docs/EXTERNAL_SERVICES_RUNBOOK.md
        - docs/runbooks/
        - raw/validation/
        - scripts/pages-deploy/
        - scripts/remote-mcp/
        - scripts/overlord/validate_provisioning_evidence.py
        - scripts/overlord/test_validate_provisioning_evidence.py
      command:
        - python3
        - scripts/overlord/validate_provisioning_evidence.py
        - --root
        - .
        - --changed-files-file
        - "{changed_files_file}"

    - id: workflow-local-coverage
      title: GitHub workflow local-first coverage inventory
      severity: blocker
      scope: changed
      paths:
        - .github/workflows/
        - .github/scripts/
        - docs/workflow-local-coverage-inventory.json
        - scripts/overlord/check_workflow_local_coverage.py
        - scripts/overlord/test_workflow_local_coverage.py
      command:
        - python3
        - scripts/overlord/test_workflow_local_coverage.py

    - id: registry-surface-reconciliation
      title: Registry-driven governance surface reconciliation
      severity: blocker
      scope: changed
      paths:
        - .github/workflows/
        - README.md
        - STANDARDS.md
        - docs/governed_repos.json
        - docs/graphify_targets.json
        - scripts/knowledge_base/prepare_local_graphify_repos.sh
        - scripts/overlord/validate_registry_surfaces.py
      command:
        - python3
        - scripts/overlord/validate_registry_surfaces.py

    - id: governance-consumer-status-report-tests
      title: Governance consumer status report tests
      severity: blocker
      scope: changed
      paths:
        - .github/workflows/overlord-sweep.yml
        - scripts/overlord/report_governance_consumer_status.py
        - scripts/overlord/test_report_governance_consumer_status.py
      command:
        - python3
        - -m
        - unittest
        - scripts.overlord.test_report_governance_consumer_status

    - id: sql-schema-drift-probe-contract
      title: SQL schema drift probe contract tests
      severity: blocker
      scope: changed
      paths:
        - docs/examples/sql-schema-drift/
        - docs/runbooks/sql-schema-drift-probes.md
        - scripts/overlord/validate_sql_schema_probe_contract.py
        - scripts/overlord/test_validate_sql_schema_probe_contract.py
      command:
        - python3
        - scripts/overlord/test_validate_sql_schema_probe_contract.py

    - id: governance-tooling-deployer-tests
      title: Governance tooling deployer tests
      severity: blocker
      scope: changed
      paths:
        - docs/governance-tooling-package.json
        - docs/runbooks/org-governance-tooling-distribution.md
        - scripts/overlord/deploy_governance_tooling.py
        - scripts/overlord/test_deploy_governance_tooling.py
        - scripts/overlord/deploy_local_ci_gate.py
        - scripts/overlord/test_deploy_local_ci_gate.py
        - docs/governance-consumer-pull-state.json
        - scripts/overlord/verify_governance_consumer.py
        - scripts/overlord/test_verify_governance_consumer.py
      command:
        - python3
        - -m
        - unittest
        - scripts.overlord.test_deploy_governance_tooling
        - scripts.overlord.test_verify_governance_consumer

    - id: local-tool-tests
      title: Local CI gate focused Python tests
      severity: advisory
      scope: changed
      paths:
        - tools/local-ci-gate/
      command:
        - python3
        - -m
        - unittest
        - discover
        - tools/local-ci-gate/tests
