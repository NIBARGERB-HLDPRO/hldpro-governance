profile:
  name: hldpro-governance
  description: Governance-repo local CI gate for deterministic checks and local-only reporting.
  report_root: cache/local-ci-gate/reports
  requires_dependencies:
    - python3
    - git
  changed_files:
    base_ref: origin/main
    head_ref: HEAD
    include_untracked: true
  checks:
    - id: overlord-backlog-alignment
      title: Overlord backlog issue alignment
      severity: blocker
      scope: always
      command:
        - python3
        - scripts/overlord/check_overlord_backlog_github_alignment.py

    - id: structured-agent-cycle-plans
      title: Structured agent cycle plan validation
      severity: blocker
      scope: always
      command:
        - python3
        - scripts/overlord/validate_structured_agent_cycle_plan.py
        - --root
        - .

    - id: governance-surface-planning
      title: Governance-surface planning gate
      severity: blocker
      scope: changed
      paths:
        - .github/
        - agents/
        - docs/
        - hooks/
        - launchd/
        - metrics/
        - raw/
        - scripts/
        - wiki/
        - OVERLORD_BACKLOG.md
      command:
        - python3
        - scripts/overlord/validate_structured_agent_cycle_plan.py
        - --root
        - .
        - --branch-name
        - "{branch_name}"
        - --changed-files-file
        - "{changed_files_file}"
        - --enforce-governance-surface

    - id: planner-boundary
      title: Planner boundary execution scope
      severity: blocker
      scope: changed
      paths:
        - CLAUDE.md
        - README.md
        - STANDARDS.md
        - OVERLORD_BACKLOG.md
        - docs/
        - raw/
        - scripts/overlord/
      command:
        - python3
        - scripts/overlord/assert_execution_scope.py
        - --scope
        - "{execution_scope}"
        - --changed-files-file
        - "{changed_files_file}"
        - --require-lane-claim

    - id: diff-hygiene
      title: Git diff whitespace hygiene
      severity: blocker
      scope: changed
      paths:
        - "*"
      command:
        - git
        - diff
        - --check

    - id: bootstrap-env-contract
      title: Bootstrap repo env contract
      severity: blocker
      scope: changed
      paths:
        - docs/ENV_REGISTRY.md
        - scripts/bootstrap-repo-env.sh
        - scripts/test_bootstrap_repo_env_contract.py
      command:
        - python3
        - scripts/test_bootstrap_repo_env_contract.py

    - id: workflow-local-coverage
      title: GitHub workflow local-first coverage inventory
      severity: blocker
      scope: changed
      paths:
        - .github/workflows/
        - .github/scripts/
        - docs/workflow-local-coverage-inventory.json
        - scripts/overlord/check_workflow_local_coverage.py
        - scripts/overlord/test_workflow_local_coverage.py
      command:
        - python3
        - scripts/overlord/test_workflow_local_coverage.py

    - id: registry-surface-reconciliation
      title: Registry-driven governance surface reconciliation
      severity: blocker
      scope: changed
      paths:
        - .github/workflows/
        - README.md
        - STANDARDS.md
        - docs/governed_repos.json
        - docs/graphify_targets.json
        - scripts/knowledge_base/prepare_local_graphify_repos.sh
        - scripts/overlord/validate_registry_surfaces.py
      command:
        - python3
        - scripts/overlord/validate_registry_surfaces.py

    - id: governance-tooling-deployer-tests
      title: Governance tooling deployer tests
      severity: blocker
      scope: changed
      paths:
        - docs/governance-tooling-package.json
        - docs/runbooks/org-governance-tooling-distribution.md
        - scripts/overlord/deploy_governance_tooling.py
        - scripts/overlord/test_deploy_governance_tooling.py
        - scripts/overlord/deploy_local_ci_gate.py
        - scripts/overlord/test_deploy_local_ci_gate.py
        - docs/governance-consumer-pull-state.json
        - scripts/overlord/verify_governance_consumer.py
        - scripts/overlord/test_verify_governance_consumer.py
      command:
        - python3
        - -m
        - unittest
        - scripts.overlord.test_deploy_governance_tooling
        - scripts.overlord.test_verify_governance_consumer

    - id: local-tool-tests
      title: Local CI gate focused Python tests
      severity: advisory
      scope: changed
      paths:
        - tools/local-ci-gate/
      command:
        - python3
        - -m
        - pytest
        - tools/local-ci-gate/tests
