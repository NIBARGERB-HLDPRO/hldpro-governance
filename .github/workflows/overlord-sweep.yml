name: Overlord Sweep — Weekly Cross-Repo Audit

on:
  schedule:
    # Every Monday at 14:00 UTC (9:00 AM CT)
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  overlord-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hldpro-governance
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Check out all 5 repos ──
      - name: Checkout ai-integration-services
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/ai-integration-services
          path: repos/ai-integration-services
          fetch-depth: 0
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout HealthcarePlatform
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/HealthcarePlatform
          path: repos/HealthcarePlatform
          fetch-depth: 0
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout local-ai-machine
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/local-ai-machine
          path: repos/local-ai-machine
          fetch-depth: 0
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout knocktracker
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/knocktracker
          path: repos/knocktracker
          fetch-depth: 0
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout ASC-Evaluator
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/ASC-Evaluator
          path: repos/ASC-Evaluator
          fetch-depth: 0
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      # ── Run the sweep ──
      - name: Run overlord sweep audit
        id: sweep
        env:
          GH_TOKEN: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          REPOS="ai-integration-services HealthcarePlatform local-ai-machine knocktracker ASC-Evaluator"
          CODE_REPOS="ai-integration-services HealthcarePlatform local-ai-machine knocktracker"
          EXEMPT_REPOS="ASC-Evaluator"
          DATE=$(date -u +%Y-%m-%d)
          CI_CUTOFF=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          INGESTION_ROOT="${RUNNER_TEMP}/codex-ingestion"
          CODEX_HOME="${RUNNER_TEMP}/codex-home"
          CODEX_TIMEOUT=240
          CODEX_MODEL="gpt-5.4"
          CODEX_AVAILABLE=false
          CODEX_SETUP_NOTE=""

          REPORT="# Overlord Weekly Sweep Report — ${DATE}\n\n"
          REPORT+="Generated by [overlord-sweep workflow](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})\n\n"

          mkdir -p "${INGESTION_ROOT}"
          mkdir -p "${CODEX_HOME}"
          export CODEX_HOME

          if [ -n "${CODEX_AUTH_JSON:-}" ]; then
            printf '%s' "${CODEX_AUTH_JSON}" > "${CODEX_HOME}/auth.json"
            chmod 600 "${CODEX_HOME}/auth.json"
            if npm install -g @openai/codex@0.118.0 >/tmp/codex-install.log 2>&1; then
              CANARY_SCHEMA="${RUNNER_TEMP}/codex-canary.schema.json"
              cat > "${CANARY_SCHEMA}" <<'EOF'
          {"type":"object","required":["ok"],"properties":{"ok":{"type":"boolean"}},"additionalProperties":false}
          EOF
              if codex exec -C "${GITHUB_WORKSPACE}" --full-auto --ephemeral -m "${CODEX_MODEL}" \
                --output-schema "${CANARY_SCHEMA}" --color never -- 'Return {"ok": true} and nothing else.' \
                >/tmp/codex-canary.stdout 2>/tmp/codex-canary.stderr; then
                CODEX_AVAILABLE=true
              else
                CODEX_SETUP_NOTE=$(python3 - <<'PY'
          from pathlib import Path
          ignored = (
              "Reading additional input from stdin",
              "OpenAI Codex v",
              "--------",
              "workdir:",
              "model:",
              "provider:",
              "approval:",
              "sandbox:",
              "reasoning effort:",
              "reasoning summaries:",
              "session id:",
              "user",
              "codex",
              "tokens used",
          )
          lines = []
          for file_name in ("/tmp/codex-canary.stderr", "/tmp/codex-canary.stdout"):
              path = Path(file_name)
              if not path.exists():
                  continue
              for raw in path.read_text(errors="ignore").splitlines():
                  line = raw.strip()
                  if not line or any(line.startswith(prefix) for prefix in ignored):
                      continue
                  lines.append(line)
          print(" | ".join(lines[-3:])[:240], end="")
          PY
                )
                if [ -z "${CODEX_SETUP_NOTE}" ]; then
                  CODEX_SETUP_NOTE=$(tr '\n' ' ' </tmp/codex-canary.stdout | sed 's/  */ /g' | cut -c1-240)
                fi
                if [ -z "${CODEX_SETUP_NOTE}" ]; then
                  CODEX_SETUP_NOTE="codex canary failed without diagnostic output"
                fi
              fi
            else
              CODEX_SETUP_NOTE=$(tail -n 5 /tmp/codex-install.log | tr '\n' ' ' | sed 's/  */ /g')
            fi
          elif [ -n "${OPENAI_API_KEY:-}" ]; then
            AUTH_PROBE_HTTP=$(curl -sS -o /tmp/openai-auth-probe.json -w "%{http_code}" \
              https://api.openai.com/v1/models \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" || true)
            if [ "${AUTH_PROBE_HTTP}" != "200" ]; then
              AUTH_PROBE_NOTE=$(tr '\n' ' ' </tmp/openai-auth-probe.json | sed 's/  */ /g' | cut -c1-180)
              CODEX_SETUP_NOTE="OpenAI auth probe failed (HTTP ${AUTH_PROBE_HTTP:-000}): ${AUTH_PROBE_NOTE}"
            elif npm install -g @openai/codex@0.118.0 >/tmp/codex-install.log 2>&1; then
              CANARY_SCHEMA="${RUNNER_TEMP}/codex-canary.schema.json"
              cat > "${CANARY_SCHEMA}" <<'EOF'
          {"type":"object","required":["ok"],"properties":{"ok":{"type":"boolean"}},"additionalProperties":false}
          EOF
              if codex exec -C "${GITHUB_WORKSPACE}" --full-auto --ephemeral -m "${CODEX_MODEL}" \
                --output-schema "${CANARY_SCHEMA}" --color never -- 'Return {"ok": true} and nothing else.' \
                >/tmp/codex-canary.stdout 2>/tmp/codex-canary.stderr; then
                CODEX_AVAILABLE=true
              else
                CODEX_SETUP_NOTE=$(python3 - <<'PY'
          from pathlib import Path
          ignored = (
              "Reading additional input from stdin",
              "OpenAI Codex v",
              "--------",
              "workdir:",
              "model:",
              "provider:",
              "approval:",
              "sandbox:",
              "reasoning effort:",
              "reasoning summaries:",
              "session id:",
              "user",
              "codex",
              "tokens used",
          )
          lines = []
          for file_name in ("/tmp/codex-canary.stderr", "/tmp/codex-canary.stdout"):
              path = Path(file_name)
              if not path.exists():
                  continue
              for raw in path.read_text(errors="ignore").splitlines():
                  line = raw.strip()
                  if not line or any(line.startswith(prefix) for prefix in ignored):
                      continue
                  lines.append(line)
          print(" | ".join(lines[-3:])[:240], end="")
          PY
                )
                if [ -z "${CODEX_SETUP_NOTE}" ]; then
                  CODEX_SETUP_NOTE=$(tr '\n' ' ' </tmp/codex-canary.stdout | sed 's/  */ /g' | cut -c1-240)
                fi
                if [ -z "${CODEX_SETUP_NOTE}" ]; then
                  CODEX_SETUP_NOTE="codex canary failed without diagnostic output"
                fi
              fi
            else
              CODEX_SETUP_NOTE=$(tail -n 5 /tmp/codex-install.log | tr '\n' ' ' | sed 's/  */ /g')
            fi
          else
            CODEX_SETUP_NOTE="Neither CODEX_AUTH_JSON nor OPENAI_API_KEY configured"
          fi

          # ── Standards Compliance ──
          REPORT+="## Standards Compliance\n\n"
          REPORT+="| Repo | CLAUDE.md | PROGRESS.md | FAIL_FAST_LOG.md | .gitleaks.toml | governance.yml | security.yml | Score |\n"
          REPORT+="|------|:---------:|:-----------:|:----------------:|:--------------:|:--------------:|:------------:|:-----:|\n"

          TOTAL_PASS=0
          TOTAL_CHECKS=0

          for repo in $REPOS; do
            DIR="repos/${repo}"
            PASS=0
            CHECKS=0
            ROW="| ${repo} |"

            if echo "$EXEMPT_REPOS" | grep -qw "$repo"; then
              ROW+=" EXEMPT | EXEMPT | EXEMPT | N/A | N/A | N/A | EXEMPT |"
              REPORT+="${ROW}\n"
              continue
            fi

            # CLAUDE.md
            CHECKS=$((CHECKS + 1))
            if [ -f "${DIR}/CLAUDE.md" ]; then
              ROW+=" :white_check_mark: |"
              PASS=$((PASS + 1))
            else
              ROW+=" :x: |"
            fi

            # docs/PROGRESS.md
            CHECKS=$((CHECKS + 1))
            if [ -f "${DIR}/docs/PROGRESS.md" ]; then
              ROW+=" :white_check_mark: |"
              PASS=$((PASS + 1))
            else
              ROW+=" :x: |"
            fi

            # docs/FAIL_FAST_LOG.md
            CHECKS=$((CHECKS + 1))
            if [ -f "${DIR}/docs/FAIL_FAST_LOG.md" ]; then
              ROW+=" :white_check_mark: |"
              PASS=$((PASS + 1))
            else
              ROW+=" :x: |"
            fi

            # .gitleaks.toml (code repos only)
            if echo "$CODE_REPOS" | grep -qw "$repo"; then
              CHECKS=$((CHECKS + 1))
              if [ -f "${DIR}/.gitleaks.toml" ]; then
                ROW+=" :white_check_mark: |"
                PASS=$((PASS + 1))
              else
                ROW+=" :x: |"
              fi
            else
              ROW+=" N/A |"
            fi

            # .github/workflows/governance.yml
            CHECKS=$((CHECKS + 1))
            if [ -f "${DIR}/.github/workflows/governance.yml" ]; then
              ROW+=" :white_check_mark: |"
              PASS=$((PASS + 1))
            else
              ROW+=" :x: |"
            fi

            # .github/workflows/security.yml
            CHECKS=$((CHECKS + 1))
            if [ -f "${DIR}/.github/workflows/security.yml" ]; then
              ROW+=" :white_check_mark: |"
              PASS=$((PASS + 1))
            else
              ROW+=" :x: |"
            fi

            ROW+=" ${PASS}/${CHECKS} |"
            REPORT+="${ROW}\n"

            TOTAL_PASS=$((TOTAL_PASS + PASS))
            TOTAL_CHECKS=$((TOTAL_CHECKS + CHECKS))
          done

          REPORT+="\n**Overall: ${TOTAL_PASS}/${TOTAL_CHECKS} checks passing**\n\n"

          # ── Commit Activity (last 7 days) ──
          REPORT+="## Commit Activity (last 7 days)\n\n"
          REPORT+="| Repo | Total Commits | Bug Fixes | Reverts | Bug Rate | Revert Rate |\n"
          REPORT+="|------|:------------:|:---------:|:-------:|:--------:|:-----------:|\n"

          for repo in $REPOS; do
            DIR="repos/${repo}"
            TOTAL=$(cd "${DIR}" && git log --oneline --since="7 days ago" 2>/dev/null | wc -l | tr -d ' ')
            BUGS=$(cd "${DIR}" && git log --oneline --since="7 days ago" 2>/dev/null | grep -ciE 'fix|bug|hotfix|revert' || true)
            BUGS=$(printf '%s' "${BUGS:-0}" | tr -d '[:space:]')
            REVERTS=$(cd "${DIR}" && git log --oneline --since="7 days ago" 2>/dev/null | grep -ci 'revert' || true)
            REVERTS=$(printf '%s' "${REVERTS:-0}" | tr -d '[:space:]')

            if [ "$TOTAL" -gt 0 ]; then
              BUG_RATE=$(awk "BEGIN {printf \"%.0f\", ($BUGS/$TOTAL)*100}")%
              REVERT_RATE=$(awk "BEGIN {printf \"%.0f\", ($REVERTS/$TOTAL)*100}")%
            else
              BUG_RATE="N/A"
              REVERT_RATE="N/A"
            fi

            REPORT+="| ${repo} | ${TOTAL} | ${BUGS} | ${REVERTS} | ${BUG_RATE} | ${REVERT_RATE} |\n"
          done

          REPORT+="\n"

          # ── CI Status (last 14 days, last 20 completed runs sampled) ──
          REPORT+="## CI Status (last 14 days)\n\n"
          REPORT+="| Repo | Pass | Fail | Other | Pass Rate |\n"
          REPORT+="|------|:----:|:----:|:-----:|:---------:|\n"

          for repo in $REPOS; do
            CI_JSON=$(gh run list \
              --repo "NIBARGERB-HLDPRO/${repo}" \
              --limit 20 \
              --json conclusion,status,createdAt \
              2>/dev/null || echo "[]")
            CI_FILTERED=$(echo "$CI_JSON" | jq --arg cutoff "$CI_CUTOFF" '[.[] | select(.status == "completed" and .createdAt >= $cutoff)]' 2>/dev/null || echo "[]")
            CI_PASS=$(echo "$CI_FILTERED" | jq '[.[] | select(.conclusion == "success")] | length' 2>/dev/null || echo 0)
            CI_PASS=$(printf '%s' "${CI_PASS:-0}" | tr -d '[:space:]')
            CI_FAIL=$(echo "$CI_FILTERED" | jq '[.[] | select(.conclusion == "failure")] | length' 2>/dev/null || echo 0)
            CI_FAIL=$(printf '%s' "${CI_FAIL:-0}" | tr -d '[:space:]')
            CI_OTHER=$(echo "$CI_FILTERED" | jq '[.[] | select(.conclusion != "success" and .conclusion != "failure")] | length' 2>/dev/null || echo 0)
            CI_OTHER=$(printf '%s' "${CI_OTHER:-0}" | tr -d '[:space:]')
            CI_TOTAL=$(echo "$CI_FILTERED" | jq 'length' 2>/dev/null || echo 0)
            CI_TOTAL=$(printf '%s' "${CI_TOTAL:-0}" | tr -d '[:space:]')

            if [ "$CI_TOTAL" -gt 0 ]; then
              CI_RATE=$(awk "BEGIN {printf \"%.0f\", ($CI_PASS/$CI_TOTAL)*100}")%
            else
              CI_RATE="N/A"
            fi

            REPORT+="| ${repo} | ${CI_PASS} | ${CI_FAIL} | ${CI_OTHER} | ${CI_RATE} |\n"
          done

          REPORT+="\n"

          # ── Doc Coverage ──
          REPORT+="## Doc Coverage\n\n"
          REPORT+="| Repo | PROGRESS | FAIL_FAST_LOG | SERVICE_REGISTRY | DATA_DICTIONARY | Agent Count |\n"
          REPORT+="|------|:--------:|:-------------:|:----------------:|:---------------:|:-----------:|\n"

          for repo in $REPOS; do
            DIR="repos/${repo}"
            ROW="| ${repo} |"

            if echo "$EXEMPT_REPOS" | grep -qw "$repo"; then
              REPORT+="| ${repo} | N/A | N/A | N/A | N/A | 0 |\n"
              continue
            fi

            for doc in PROGRESS.md FAIL_FAST_LOG.md SERVICE_REGISTRY.md DATA_DICTIONARY.md; do
              if [ -f "${DIR}/docs/${doc}" ]; then
                ROW+=" :white_check_mark: |"
              else
                ROW+=" :x: |"
              fi
            done

            # Agent count: check .claude/agents/ and backend/.agents/
            AGENT_COUNT=0
            if [ -d "${DIR}/.claude/agents" ]; then
              AGENT_COUNT=$((AGENT_COUNT + $(find "${DIR}/.claude/agents" -name '*.md' 2>/dev/null | wc -l | tr -d ' ')))
            fi
            if [ -d "${DIR}/backend/.agents" ]; then
              AGENT_COUNT=$((AGENT_COUNT + $(find "${DIR}/backend/.agents" -name '*.md' 2>/dev/null | wc -l | tr -d ' ')))
            fi
            ROW+=" ${AGENT_COUNT} |"

            REPORT+="${ROW}\n"
          done

          REPORT+="\n"

          # ── PROGRESS.md ↔ GitHub backlog staleness ──
          REPORT+="## PROGRESS.md ↔ GitHub Backlog Drift\n\n"
          REPORT+="| Repo | Status | Missing Open Backlog Issues | Stale Closed Issues |\n"
          REPORT+="|------|--------|----------------------------:|--------------------:|\n"

          for repo in $REPOS; do
            DIR="repos/${repo}"

            if echo "$EXEMPT_REPOS" | grep -qw "$repo"; then
              REPORT+="| ${repo} | EXEMPT | 0 | 0 |\n"
              continue
            fi

            if [ ! -f "${DIR}/docs/PROGRESS.md" ]; then
              REPORT+="| ${repo} | MISSING PROGRESS.md | 0 | 0 |\n"
              continue
            fi

            SUMMARY_JSON=$(python3 scripts/overlord/check_progress_github_issue_staleness.py \
              --repo "NIBARGERB-HLDPRO/${repo}" \
              --progress-path "${DIR}/docs/PROGRESS.md" \
              --json)

            MISSING_COUNT=$(SUMMARY_JSON="$SUMMARY_JSON" python3 -c 'import json, os; print(len(json.loads(os.environ["SUMMARY_JSON"]).get("missing_open_issue_numbers", [])))')
            STALE_COUNT=$(SUMMARY_JSON="$SUMMARY_JSON" python3 -c 'import json, os; print(len(json.loads(os.environ["SUMMARY_JSON"]).get("stale_closed_issue_numbers", [])))')

            STATUS="CLEAN"
            if [ "$MISSING_COUNT" -gt 0 ] || [ "$STALE_COUNT" -gt 0 ]; then
              STATUS="DRIFT"
            fi

            REPORT+="| ${repo} | ${STATUS} | ${MISSING_COUNT} | ${STALE_COUNT} |\n"

            if [ "$STATUS" = "DRIFT" ]; then
              REPORT+="\n### ${repo} backlog drift\n"
              if [ "$MISSING_COUNT" -gt 0 ]; then
                MISSING_ISSUES=$(SUMMARY_JSON="$SUMMARY_JSON" python3 -c 'import json, os; summary=json.loads(os.environ["SUMMARY_JSON"]); print(", ".join(f"#{n}" for n in summary.get("missing_open_issue_numbers", [])))')
                REPORT+="- Missing open backlog issues from active PROGRESS sections: ${MISSING_ISSUES}\n"
              fi
              if [ "$STALE_COUNT" -gt 0 ]; then
                STALE_ISSUES=$(SUMMARY_JSON="$SUMMARY_JSON" python3 -c 'import json, os; summary=json.loads(os.environ["SUMMARY_JSON"]); print(", ".join(f"#{n}" for n in summary.get("stale_closed_issue_numbers", [])))')
                REPORT+="- Closed backlog issues still listed as active: ${STALE_ISSUES}\n"
              fi
              REPORT+="\n"
            fi
          done

          REPORT+="\n"

          # ── Codex Second Opinion ──
          REPORT+="## Codex Second Opinion\n\n"
          REPORT+="| Repo | Review Status | Qualified Findings | Notes |\n"
          REPORT+="|------|---------------|-------------------:|-------|\n"

          for repo in $CODE_REPOS; do
            REVIEW_PATH="${INGESTION_ROOT}/${repo}/review-${DATE}.json"
            QUALIFIED_PATH="${INGESTION_ROOT}/${repo}/qualified-${DATE}.json"

            if [ "$CODEX_AVAILABLE" != "true" ]; then
              REPORT+="| ${repo} | SKIPPED | 0 | ${CODEX_SETUP_NOTE:-Codex unavailable} |\n"
              continue
            fi

            python3 scripts/overlord/codex_ingestion.py generate \
              --repo "$repo" \
              --repo-path "repos/$repo" \
              --date "$DATE" \
              --ingestion-root "$INGESTION_ROOT" \
              --timeout-seconds "$CODEX_TIMEOUT" \
              --model "$CODEX_MODEL"

            python3 scripts/overlord/codex_ingestion.py qualify \
              --repo "$repo" \
              --repo-path "repos/$repo" \
              --date "$DATE" \
              --ingestion-root "$INGESTION_ROOT"

            if jq -e '.skipped == true' "$REVIEW_PATH" >/dev/null 2>&1; then
              REVIEW_REASON=$(jq -r '.reason // "review skipped"' "$REVIEW_PATH" | tr '\n' ' ' | sed 's/|/\\|/g')
              REPORT+="| ${repo} | SKIPPED | 0 | ${REVIEW_REASON} |\n"
              continue
            fi

            QUALIFIED_COUNT=$(jq '[.candidates[]] | length' "$QUALIFIED_PATH" 2>/dev/null || echo 0)
            FINDING_COUNT=$(jq '[.findings[]] | length' "$REVIEW_PATH" 2>/dev/null || echo 0)
            TOP_TITLE=$(jq -r '.candidates[0].title // .findings[0].title // "No qualified findings"' "$QUALIFIED_PATH" "$REVIEW_PATH" 2>/dev/null | head -1 | tr '\n' ' ' | sed 's/|/\\|/g')

            REPORT+="| ${repo} | OK (${FINDING_COUNT} findings) | ${QUALIFIED_COUNT} | ${TOP_TITLE} |\n"
          done

          REPORT+="\n"

          # ── Commit Convention (last 10 commits) ──
          REPORT+="## Commit Convention Compliance\n\n"
          REPORT+="| Repo | Conventional | Non-Conventional | Rate |\n"
          REPORT+="|------|:-----------:|:----------------:|:----:|\n"

          for repo in $REPOS; do
            DIR="repos/${repo}"
            TOTAL_MSGS=$(cd "${DIR}" && git log --oneline -10 2>/dev/null | wc -l | tr -d ' ')
            CONVENTIONAL=$(cd "${DIR}" && git log --oneline -10 2>/dev/null | grep -cE '^[a-f0-9]+ (feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\(.+\))?:' || true)
            CONVENTIONAL=$(printf '%s' "${CONVENTIONAL:-0}" | tr -d '[:space:]')
            NON_CONV=$((TOTAL_MSGS - CONVENTIONAL))

            if [ "$TOTAL_MSGS" -gt 0 ]; then
              CONV_RATE=$(awk "BEGIN {printf \"%.0f\", ($CONVENTIONAL/$TOTAL_MSGS)*100}")%
            else
              CONV_RATE="N/A"
            fi

            REPORT+="| ${repo} | ${CONVENTIONAL} | ${NON_CONV} | ${CONV_RATE} |\n"
          done

          REPORT+="\n"

          # ── Missing Items Summary ──
          REPORT+="## Action Items\n\n"

          for repo in $REPOS; do
            DIR="repos/${repo}"
            MISSING=""

            if echo "$EXEMPT_REPOS" | grep -qw "$repo"; then
              continue
            fi

            [ ! -f "${DIR}/CLAUDE.md" ] && MISSING+="- Add \`CLAUDE.md\` to repo root\n"
            [ ! -f "${DIR}/docs/PROGRESS.md" ] && MISSING+="- Add \`docs/PROGRESS.md\`\n"
            [ ! -f "${DIR}/docs/FAIL_FAST_LOG.md" ] && MISSING+="- Add \`docs/FAIL_FAST_LOG.md\`\n"

            if echo "$CODE_REPOS" | grep -qw "$repo"; then
              [ ! -f "${DIR}/.gitleaks.toml" ] && MISSING+="- Add \`.gitleaks.toml\` for credential scanning\n"
            fi

            [ ! -f "${DIR}/.github/workflows/governance.yml" ] && MISSING+="- Add \`.github/workflows/governance.yml\`\n"
            [ ! -f "${DIR}/.github/workflows/security.yml" ] && MISSING+="- Add \`.github/workflows/security.yml\`\n"

            if [ -n "$MISSING" ]; then
              REPORT+="### ${repo}\n${MISSING}\n"
            fi
          done

          REPORT+="---\n*This report is auto-generated by the overlord-sweep workflow. Do not edit manually.*\n"

          # Write report to file for issue creation
          echo -e "$REPORT" > /tmp/sweep-report.md

          # Store for next step
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Memory integrity audit
        run: python3 scripts/overlord/memory_integrity.py
        continue-on-error: false  # memory drift should fail the sweep

      - name: Build effectiveness baseline snapshot
        run: |
          DATE=$(date -u +%Y-%m-%d)
          python3 scripts/overlord/build_effectiveness_metrics.py \
            --repos-root repos \
            --output-dir metrics/effectiveness-baseline \
            --date "$DATE"

      # ── Update knowledge graph ──
      - name: Update knowledge graph
        run: |
          python3.11 -m pip install graphifyy -q
          python3 scripts/knowledge_base/graphify_targets.py list --scheduled --format tsv > /tmp/graphify-targets.tsv
          while IFS=$'\t' read -r repo_slug display_name source_path output_path wiki_path; do
            if [ -d "$source_path" ]; then
              echo "Refreshing graphify artifacts for ${display_name}"
              python3.11 scripts/knowledge_base/build_graph.py \
                --source "$source_path" \
                --output "$output_path" \
                --wiki-dir "$wiki_path" \
                --repo-slug "$repo_slug" \
                --no-html 2>&1 | tail -20 || echo "graphify update skipped for ${display_name} — non-fatal"
            else
              echo "${display_name} not checked out at ${source_path} — skipping"
            fi
          done < /tmp/graphify-targets.tsv
          python3 scripts/knowledge_base/update_knowledge_index.py

      - name: Commit updated graph
        id: persist_baseline
        run: |
          set +e
          git config user.name "overlord-bot"
          git config user.email "overlord@hldpro.com"
          python3 scripts/knowledge_base/graphify_targets.py stage-paths --scheduled | xargs git add 2>/dev/null || true
          git add wiki/index.md metrics/effectiveness-baseline 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "status=no_changes" >> "$GITHUB_OUTPUT"
            echo "note=No graph or metrics changes were generated." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_MESSAGE="chore(governance): weekly graph and metrics update $(date -u +%Y-%m-%d)"
          COMMIT_OUTPUT=$(git commit -m "$COMMIT_MESSAGE" 2>&1)
          COMMIT_STATUS=$?
          if [ $COMMIT_STATUS -ne 0 ]; then
            NOTE=$(printf '%s' "$COMMIT_OUTPUT" | tail -n 10 | tr '\n' ' ' | sed 's/  */ /g')
            echo "status=commit_failed" >> "$GITHUB_OUTPUT"
            echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PUSH_OUTPUT=$(git push 2>&1)
          PUSH_STATUS=$?
          if [ $PUSH_STATUS -ne 0 ]; then
            NOTE=$(printf '%s' "$PUSH_OUTPUT" | tail -n 10 | tr '\n' ' ' | sed 's/  */ /g')
            echo "status=push_failed" >> "$GITHUB_OUTPUT"
            echo "note=${NOTE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "note=Graph and metrics updates were committed and pushed successfully." >> "$GITHUB_OUTPUT"

      # ── Create or update GitHub Issue ──
      - name: Create or update overlord report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Check for existing open issue with the overlord-report label
          EXISTING=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label "overlord-report" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          BODY=$(cat /tmp/sweep-report.md)
          PERSIST_STATUS="${{ steps.persist_baseline.outputs.status }}"
          PERSIST_NOTE="${{ steps.persist_baseline.outputs.note }}"
          if [ -z "$PERSIST_STATUS" ]; then
            PERSIST_STATUS="unknown"
            PERSIST_NOTE="Baseline refresh step did not report a status."
          fi
          BODY="${BODY}

          ## BASELINE REFRESH
          - Status: ${PERSIST_STATUS}
          - Detail: ${PERSIST_NOTE}"

          if [ -n "$EXISTING" ]; then
            # Update existing issue
            gh issue edit "$EXISTING" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Overlord Sweep Report — ${DATE}" \
              --body "$BODY"
            echo "Updated existing issue #${EXISTING}"
          else
            # Ensure label exists
            gh label create "overlord-report" \
              --repo "${GITHUB_REPOSITORY}" \
              --description "Auto-generated weekly overlord sweep report" \
              --color "0E8A16" 2>/dev/null || true

            # Create new issue
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Overlord Sweep Report — ${DATE}" \
              --label "overlord-report" \
              --body "$BODY"
            echo "Created new overlord report issue"
          fi

      - name: Fail on baseline persistence error
        if: ${{ steps.persist_baseline.outputs.status == 'commit_failed' || steps.persist_baseline.outputs.status == 'push_failed' }}
        run: |
          echo "Baseline refresh did not persist successfully: ${{ steps.persist_baseline.outputs.note }}"
          exit 1
