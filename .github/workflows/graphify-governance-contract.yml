name: graphify-governance-contract

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate graphify governance contract
        run: |
          python3 -m py_compile \
            scripts/knowledge_base/build_graph.py \
            scripts/knowledge_base/graphify_targets.py \
            scripts/knowledge_base/log_graphify_usage.py \
            scripts/knowledge_base/measure_graphify_usage.py \
            scripts/knowledge_base/test_graphify_usage_logging_contract.py \
            scripts/knowledge_base/update_knowledge_index.py \
            scripts/knowledge_base/test_graphify_governance_contract.py
          python3 scripts/knowledge_base/test_graphify_governance_contract.py
          python3 scripts/knowledge_base/test_graphify_usage_logging_contract.py

      - name: Validate generated wiki index is committed
        run: |
          python3 scripts/knowledge_base/update_knowledge_index.py
          git diff --exit-code -- wiki/index.md
