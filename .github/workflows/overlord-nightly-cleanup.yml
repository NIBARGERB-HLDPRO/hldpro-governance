name: Overlord Cleanup — Nightly Repo Hygiene

on:
  schedule:
    # 04:00 UTC daily.
    # This is 11:00 PM America/Chicago during daylight saving time.
    # After the switch to standard time on November 1, 2026, the same cron runs at 10:00 PM America/Chicago.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  nightly-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hldpro-governance
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout ai-integration-services
        uses: actions/checkout@v4
        with:
          repository: NIBARGERB-HLDPRO/ai-integration-services
          path: repos/ai-integration-services
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout HealthcarePlatform
        uses: actions/checkout@v4
        with:
          repository: NIBARGERB-HLDPRO/HealthcarePlatform
          path: repos/HealthcarePlatform
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout local-ai-machine
        uses: actions/checkout@v4
        with:
          repository: NIBARGERB-HLDPRO/local-ai-machine
          path: repos/local-ai-machine
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout knocktracker
        uses: actions/checkout@v4
        with:
          repository: NIBARGERB-HLDPRO/knocktracker
          path: repos/knocktracker
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout ASC-Evaluator
        uses: actions/checkout@v4
        with:
          repository: NIBARGERB-HLDPRO/ASC-Evaluator
          path: repos/ASC-Evaluator
          token: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run nightly cleanup
        id: cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPOS="ai-integration-services HealthcarePlatform local-ai-machine knocktracker ASC-Evaluator"
          DATE=$(date -u +%Y-%m-%d)
          OWNER="NIBARGERB-HLDPRO"
          ARTIFACT_CUTOFF=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          BRANCH_CUTOFF_EPOCH=$(date -u -d '14 days ago' +%s)

          REPORT="# Overlord Nightly Cleanup Report — ${DATE}\n\n"
          REPORT+="Generated by [overlord-nightly-cleanup workflow](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})\n\n"
          REPORT+="Cleanup policy:\n"
          REPORT+="- Delete GitHub Actions artifacts older than 14 days\n"
          REPORT+="- Report stale merged remote branches older than 14 days\n"
          REPORT+="- Never auto-delete branches\n\n"

          REPORT+="## Artifact Cleanup\n\n"
          REPORT+="| Repo | Deleted Artifacts | Notes |\n"
          REPORT+="|------|:-----------------:|-------|\n"

          REPORT+="## Stale Merged Branches\n\n"
          REPORT+="| Repo | Default Branch | Stale Merged Branches |\n"
          REPORT+="|------|----------------|-----------------------|\n"

          ACTION_ITEMS=""

          for repo in $REPOS; do
            REPO_SLUG="${OWNER}/${repo}"
            DIR="repos/${repo}"
            DEFAULT_BRANCH=$(gh repo view "${REPO_SLUG}" --json defaultBranchRef --jq '.defaultBranchRef.name')

            # Refresh full remote branch state for merged-branch reporting.
            git -C "${DIR}" fetch origin --prune '+refs/heads/*:refs/remotes/origin/*'

            # Delete non-expired artifacts older than the cutoff.
            ARTIFACT_IDS=$(gh api "repos/${REPO_SLUG}/actions/artifacts?per_page=100" --paginate \
              --jq ".artifacts[] | select(.expired == false and .created_at < \"${ARTIFACT_CUTOFF}\") | .id")

            DELETED_COUNT=0
            if [ -n "${ARTIFACT_IDS}" ]; then
              while IFS= read -r artifact_id; do
                [ -z "${artifact_id}" ] && continue
                gh api -X DELETE "repos/${REPO_SLUG}/actions/artifacts/${artifact_id}" >/dev/null
                DELETED_COUNT=$((DELETED_COUNT + 1))
              done <<< "${ARTIFACT_IDS}"
            fi

            if [ "${DELETED_COUNT}" -gt 0 ]; then
              ARTIFACT_NOTE="Deleted artifacts created before ${ARTIFACT_CUTOFF}"
            else
              ARTIFACT_NOTE="No deletions needed"
            fi
            REPORT+="| ${repo} | ${DELETED_COUNT} | ${ARTIFACT_NOTE} |\n"

            STALE_BRANCHES=""
            while IFS='|' read -r remote_ref commit_epoch; do
              [ -z "${remote_ref}" ] && continue
              branch_name="${remote_ref#origin/}"

              case "${branch_name}" in
                HEAD|${DEFAULT_BRANCH}|main|master|develop)
                  continue
                  ;;
              esac

              if [ "${commit_epoch}" -ge "${BRANCH_CUTOFF_EPOCH}" ]; then
                continue
              fi

              if git -C "${DIR}" merge-base --is-ancestor "${remote_ref}" "origin/${DEFAULT_BRANCH}"; then
                STALE_BRANCHES+="${branch_name}, "
              fi
            done < <(git -C "${DIR}" for-each-ref --format='%(refname:short)|%(committerdate:unix)' refs/remotes/origin)

            if [ -n "${STALE_BRANCHES}" ]; then
              STALE_BRANCHES="${STALE_BRANCHES%, }"
              REPORT+="| ${repo} | ${DEFAULT_BRANCH} | ${STALE_BRANCHES} |\n"
              ACTION_ITEMS+="### ${repo}\n- Review merged branches older than 14 days and delete any that are safe to remove: ${STALE_BRANCHES}\n\n"
            else
              REPORT+="| ${repo} | ${DEFAULT_BRANCH} | None |\n"
            fi
          done

          REPORT+="\n## Action Items\n\n"
          if [ -n "${ACTION_ITEMS}" ]; then
            REPORT+="${ACTION_ITEMS}"
          else
            REPORT+="No stale merged branches require review.\n"
          fi

          REPORT+="\n---\n*This report is auto-generated by the overlord-nightly-cleanup workflow. It deletes old Actions artifacts but does not delete branches.*\n"

          echo -e "${REPORT}" > /tmp/nightly-cleanup-report.md
          echo "date=${DATE}" >> "${GITHUB_OUTPUT}"

      - name: Create or update nightly cleanup issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DATE=$(date -u +%Y-%m-%d)
          EXISTING=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label "overlord-cleanup" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          BODY=$(cat /tmp/nightly-cleanup-report.md)

          if [ -n "${EXISTING}" ]; then
            gh issue edit "${EXISTING}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Overlord Nightly Cleanup Report — ${DATE}" \
              --body "${BODY}"
          else
            gh label create "overlord-cleanup" \
              --repo "${GITHUB_REPOSITORY}" \
              --description "Auto-generated nightly cleanup report" \
              --color "5319E7" 2>/dev/null || true

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Overlord Nightly Cleanup Report — ${DATE}" \
              --label "overlord-cleanup" \
              --body "${BODY}"
          fi
