name: check-backlog-gh-sync
on:
  pull_request:
    paths: ['OVERLORD_BACKLOG.md']
  push:
    branches: [main]
    paths: ['OVERLORD_BACKLOG.md']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate backlog GH issue sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/validate_backlog_gh_sync.sh
