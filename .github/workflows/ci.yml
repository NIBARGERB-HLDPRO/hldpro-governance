name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance-check:
    uses: ./.github/workflows/governance-check.yml
    with:
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  require-cross-review:
    uses: ./.github/workflows/require-cross-review.yml
    with:
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  check-arch-tier:
    uses: ./.github/workflows/check-arch-tier.yml
    with:
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  check-no-self-approval:
    uses: ./.github/workflows/check-no-self-approval.yml
    secrets: inherit

  check-acceptance-audit:
    uses: ./.github/workflows/check-acceptance-audit.yml
    with:
      head_ref: ${{ github.head_ref || github.ref_name }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      planning_only: false
    secrets: inherit
