name: Raw Feed Sync

on:
  schedule:
    - cron: '0 12 * * *'  # Daily 12:00 UTC (6 AM CT / 7 AM CDT)
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync-github-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch GitHub issues from governed repos
        env:
          GH_TOKEN: ${{ secrets.GH_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p raw/github-issues

          REPOS=$(python3 scripts/overlord/validate_governed_repos.py --print-subsystem raw_feed_sync)
          for REPO in $REPOS; do
            echo "Fetching issues from $REPO..."
            gh issue list \
              --repo "NIBARGERB-HLDPRO/$REPO" \
              --state open \
              --json number,title,labels,createdAt,updatedAt,url \
              --limit 50 \
              > "/tmp/issues-$REPO.json" || true

            python3 scripts/overlord/render_github_issue_feed.py \
              --input "/tmp/issues-$REPO.json" \
              --output "raw/github-issues/${DATE}-${REPO}.md" \
              --repo "$REPO" \
              --date "$DATE"
          done

      - name: Commit raw feed updates
        run: |
          git config user.name "overlord-bot"
          git config user.email "overlord@hldpro.com"
          git add raw/github-issues/
          git diff --staged --quiet || git commit -m "chore(raw): nightly github issues feed $(date -u +%Y-%m-%d)"
          git push
