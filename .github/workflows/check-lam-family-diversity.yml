name: check-lam-family-diversity
on:
  workflow_call:
permissions:
  contents: read

jobs:
  check-lam-family-diversity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate LAM reviewer/worker family diversity
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          python3 .github/scripts/check_lam_family_diversity.py
