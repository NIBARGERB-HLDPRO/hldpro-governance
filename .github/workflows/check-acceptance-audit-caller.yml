name: check-acceptance-audit-caller

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  call-check-acceptance-audit:
    uses: ./.github/workflows/check-acceptance-audit.yml
    with:
      head_ref: ${{ github.head_ref || github.ref_name }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      planning_only: false
    secrets: inherit
