name: Governance Check (Reusable)

on:
  workflow_call:
    inputs:
      base_sha:
        required: false
        type: string
      head_sha:
        required: false
        type: string
    secrets:
      SUPABASE_ANON_KEY:
        required: false
      SUPABASE_SERVICE_ROLE_KEY:
        required: false

jobs:
  governance-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout governance standards repo for shared validators
        if: github.repository != 'NIBARGERB-HLDPRO/hldpro-governance'
        uses: actions/checkout@v6
        with:
          repository: NIBARGERB-HLDPRO/hldpro-governance
          path: .governance
          fetch-depth: 1

      # ── 1. Required governance docs exist ──
      - name: Check required governance docs exist
        run: |
          MISSING=""
          for doc in docs/PROGRESS.md docs/FEATURE_REGISTRY.md docs/FAIL_FAST_LOG.md docs/DATA_DICTIONARY.md docs/SERVICE_REGISTRY.md; do
            if [ ! -f "$doc" ]; then
              MISSING="${MISSING}\n  - $doc"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Required governance docs missing:${MISSING}"
            echo ""
            echo "Every repo must have these docs. Create them (even as stubs) before merging."
            exit 1
          fi
          echo "✓ All required governance docs exist"

      - name: Check governance doc structure
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          FAILURES=""

          require_pattern() {
            local file="$1"
            local pattern="$2"
            local label="$3"
            if ! grep -Eq "$pattern" "$file"; then
              FAILURES="${FAILURES}\n  - ${file}: missing ${label}"
            fi
          }

          # PROGRESS.md
          if [ "$REPO_NAME" = "ai-integration-services" ]; then
            require_pattern "docs/PROGRESS.md" '^# Backlog$|^## Backlog — Open Plans & Action Items$' 'AIS backlog section'
            require_pattern "docs/PROGRESS.md" '^## Known Bugs$' 'Known Bugs section'
          else
            require_pattern "docs/PROGRESS.md" '^## Plans$' 'Plans section'
            require_pattern "docs/PROGRESS.md" '^\| Plan \| Status \| Priority \| Est\. Hours \| Deliverables \| Notes \|$' 'Plans table header'
            require_pattern "docs/PROGRESS.md" '^## Known Bugs$' 'Known Bugs section'
            require_pattern "docs/PROGRESS.md" '^## Feature Requests$' 'Feature Requests section'
            require_pattern "docs/PROGRESS.md" '^## Operational Items$' 'Operational Items section'
          fi

          # FEATURE_REGISTRY.md
          require_pattern "docs/FEATURE_REGISTRY.md" '^# .+Feature Registry' 'Feature Registry title'
          require_pattern "docs/FEATURE_REGISTRY.md" 'Last Updated' 'Last Updated metadata'
          require_pattern "docs/FEATURE_REGISTRY.md" '^## Summary Table$' 'Summary Table section'
          require_pattern "docs/FEATURE_REGISTRY.md" '^\| Feature ID \| Domain \| Feature \| Status \| Readiness \|' 'summary table header'

          # DATA_DICTIONARY.md
          require_pattern "docs/DATA_DICTIONARY.md" '^# Data Dictionary$' 'Data Dictionary title'
          require_pattern "docs/DATA_DICTIONARY.md" 'Last [Uu]pdated' 'Last updated metadata'
          if [ "$REPO_NAME" = "HealthcarePlatform" ]; then
            require_pattern "docs/DATA_DICTIONARY.md" 'backend/DATA_DICTIONARY\.md' 'canonical backend pointer'
          else
            require_pattern "docs/DATA_DICTIONARY.md" '(Source of [Tt]ruth|canonical)' 'source-of-truth metadata'
            require_pattern "docs/DATA_DICTIONARY.md" '(^## Table of Contents$)|(^\| Table \| Description \| Key Columns \|$)|(^\| Column \| Type \| Constraints \| Notes \|$)|(^\| Artifact \| Description \| Key Fields \|$)' 'dictionary body or pointer contract'
            if grep -Eq '^\| \((tables|columns) will be documented here\)' "docs/DATA_DICTIONARY.md"; then
              FAILURES="${FAILURES}\n  - docs/DATA_DICTIONARY.md: placeholder-only rows are not allowed"
            fi
          fi

          # SERVICE_REGISTRY.md
          require_pattern "docs/SERVICE_REGISTRY.md" '^# Service Registry' 'Service Registry title'
          require_pattern "docs/SERVICE_REGISTRY.md" 'Last [Uu]pdated' 'Last updated metadata'
          require_pattern "docs/SERVICE_REGISTRY.md" '(Source of [Tt]ruth|canonical)' 'source-of-truth metadata'
          require_pattern "docs/SERVICE_REGISTRY.md" '(^\| Function \|)|(^\| Service \|)' 'service or function registry table'
          if grep -Eq '^\| \((services|functions) will be documented here\)' "docs/SERVICE_REGISTRY.md"; then
            FAILURES="${FAILURES}\n  - docs/SERVICE_REGISTRY.md: placeholder-only rows are not allowed"
          fi

          if [ -n "$FAILURES" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Governance doc structure is incomplete:${FAILURES}"
            echo ""
            echo "Rule: governed docs must satisfy the shared minimum contract in STANDARDS.md, including allowed repo-specific exceptions."
            exit 1
          fi

          echo "✓ Governance doc structure check passed"

      - name: Check OVERLORD_BACKLOG issue alignment
        if: github.repository == 'NIBARGERB-HLDPRO/hldpro-governance'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/overlord/check_overlord_backlog_github_alignment.py

      - name: Check governance session contract surfaces
        if: github.repository == 'NIBARGERB-HLDPRO/hldpro-governance'
        run: |
          python3 scripts/overlord/validate_session_contract_surfaces.py --root .

      - name: Check PROGRESS.md ↔ GitHub issue staleness
        if: github.repository != 'NIBARGERB-HLDPRO/hldpro-governance'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .governance/scripts/overlord/check_progress_github_issue_staleness.py \
            --repo "${GITHUB_REPOSITORY}" \
            --progress-path docs/PROGRESS.md

      - name: Verify governed consumer contract
        if: github.repository != 'NIBARGERB-HLDPRO/hldpro-governance' && hashFiles('.hldpro/governance-tooling.json') != ''
        run: |
          python3 .governance/scripts/overlord/verify_governance_consumer.py \
            --governance-root .governance \
            --target-repo .

      - name: Validate structured agent cycle plans
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            VALIDATOR="scripts/overlord/validate_structured_agent_cycle_plan.py"
          else
            VALIDATOR=".governance/scripts/overlord/validate_structured_agent_cycle_plan.py"
          fi

          python3 "$VALIDATOR" \
            --root . \
            --require-if-issue-branch \
            --branch-name "$BRANCH_NAME"

      - name: Resolve diff base
        id: diff_base
        run: |
          set -euo pipefail

          BASE_SHA="${{ inputs.base_sha }}"

          if [ -z "$BASE_SHA" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="${{ github.event.before }}"
            else
              BASE_SHA="$(git rev-parse HEAD~1)"
            fi
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      # ── Categorize changed files ──
      - name: Get changed files
        id: changed
        run: |
          BASE="${{ steps.diff_base.outputs.base_sha }}"

          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          printf '%s\n' "$CHANGED" > /tmp/governance-changed-files.txt

          # Source code changes (broad: .ts .tsx .sql .html .css .js .svg .py .sh)
          # Exclude: docs, .claude (hooks/settings/config), .github, tests, configs, lock files
          CODE_CHANGES=$(echo "$CHANGED" | grep -E '\.(ts|tsx|sql|html|css|js|svg|py|sh)$' \
            | grep -v '^docs/' \
            | grep -v '^\.claude/' \
            | grep -v '^\.claude/hooks/' \
            | grep -v '^\.claude/settings' \
            | grep -v '^\.github/' \
            | grep -v '\.spec\.' \
            | grep -v '\.test\.' \
            | grep -v '__tests__/' \
            | grep -v '^tests/' \
            | grep -v '^e2e/' \
            | grep -v 'tsconfig' \
            | grep -v 'package-lock' \
            | grep -v '\.config\.' \
            | grep -v 'vite\.config' \
            | grep -v 'vitest\.config' \
            | grep -v 'jest\.config' \
            | grep -v 'eslint' \
            | grep -v 'scripts/seed-' \
            || true)

          MIGRATION_CHANGES=$(echo "$CHANGED" | grep -E '\.sql$' | grep -iE 'migration' || true)
          # Only newly ADDED function index.ts files (not modified existing ones)
          FUNCTION_CHANGES=$(git diff --diff-filter=A --name-only "$BASE" HEAD 2>/dev/null | grep -E 'functions/.*/index\.ts$' || true)
          MARKETING_CHANGES=$(echo "$CHANGED" | grep -E '^marketing/' || true)
          INFRA_CHANGES=$(echo "$CHANGED" | grep -E '^infrastructure/|^\.github/workflows/' || true)

          PROGRESS_CHANGED=$(echo "$CHANGED" | grep -E 'docs/PROGRESS\.md' || true)
          FAILFAST_CHANGED=$(echo "$CHANGED" | grep -E 'docs/FAIL_FAST_LOG\.md' || true)
          DATADICT_CHANGED=$(echo "$CHANGED" | grep -E 'docs/DATA_DICTIONARY\.md' || true)
          REGISTRY_CHANGED=$(echo "$CHANGED" | grep -E 'docs/SERVICE_REGISTRY\.md' || true)
          FEATURE_REGISTRY_CHANGED=$(echo "$CHANGED" | grep -E 'docs/FEATURE_REGISTRY\.md' || true)
          MARKETING_DOC_CHANGED=$(echo "$CHANGED" | grep -E 'marketing/MARKETING_PAGE\.md' || true)

          {
            echo "code_changes<<EOF"
            echo "$CODE_CHANGES"
            echo "EOF"
            echo "has_code=$([ -n "$CODE_CHANGES" ] && echo 'true' || echo 'false')"
            echo "has_migrations=$([ -n "$MIGRATION_CHANGES" ] && echo 'true' || echo 'false')"
            echo "has_functions=$([ -n "$FUNCTION_CHANGES" ] && echo 'true' || echo 'false')"
            echo "has_marketing=$([ -n "$MARKETING_CHANGES" ] && echo 'true' || echo 'false')"
            echo "has_infra=$([ -n "$INFRA_CHANGES" ] && echo 'true' || echo 'false')"
            echo "has_progress=$([ -n "$PROGRESS_CHANGED" ] && echo 'true' || echo 'false')"
            echo "has_failfast=$([ -n "$FAILFAST_CHANGED" ] && echo 'true' || echo 'false')"
            echo "has_datadict=$([ -n "$DATADICT_CHANGED" ] && echo 'true' || echo 'false')"
            echo "has_registry=$([ -n "$REGISTRY_CHANGED" ] && echo 'true' || echo 'false')"
            echo "has_feature_registry=$([ -n "$FEATURE_REGISTRY_CHANGED" ] && echo 'true' || echo 'false')"
            echo "has_marketing_doc=$([ -n "$MARKETING_DOC_CHANGED" ] && echo 'true' || echo 'false')"
          } >> "$GITHUB_OUTPUT"

      - name: Enforce governance-surface planning gate
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            VALIDATOR="scripts/overlord/validate_structured_agent_cycle_plan.py"
          else
            VALIDATOR=".governance/scripts/overlord/validate_structured_agent_cycle_plan.py"
          fi

          python3 "$VALIDATOR" \
            --root . \
            --branch-name "$BRANCH_NAME" \
            --changed-files-file /tmp/governance-changed-files.txt \
            --enforce-governance-surface

      - name: Validate handoff package integrity
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            HANDOFF_VALIDATOR="scripts/overlord/validate_handoff_package.py"
          else
            HANDOFF_VALIDATOR=".governance/scripts/overlord/validate_handoff_package.py"
          fi

          if [ ! -f "$HANDOFF_VALIDATOR" ]; then
            echo "::error::GOVERNANCE GATE FAILED: handoff package validator missing at ${HANDOFF_VALIDATOR}."
            exit 1
          fi

          # Any plan update can change handoff refs or ACs, so docs/plans/ intentionally triggers this cheap validator.
          HANDOFF_REGEX='^(docs/plans/|docs/schemas/(package-handoff\.schema\.json|examples/package-handoff/)|raw/(closeouts|cross-review|execution-scopes|handoffs|packets|validation)/|scripts/overlord/(validate_handoff_package|test_validate_handoff_package)\.py$)'
          HANDOFF_CHANGES="$(grep -E "$HANDOFF_REGEX" /tmp/governance-changed-files.txt || true)"
          if [ -z "$HANDOFF_CHANGES" ] && ! echo "$BRANCH_NAME" | grep -Eq '(^|/)issue-[0-9]+'; then
            echo "✓ No handoff package paths changed; handoff integrity validation skipped"
            exit 0
          fi

          if [ -n "$HANDOFF_CHANGES" ]; then
            echo "Handoff-relevant changes:"
            echo "$HANDOFF_CHANGES"
          else
            echo "Issue branch detected; running handoff validation even without direct handoff-path changes"
          fi
          python3 "$HANDOFF_VALIDATOR" --root .

      - name: Enforce Stage 6 closeout evidence
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            CLOSEOUT_CHECK="scripts/overlord/check_stage6_closeout.py"
          else
            CLOSEOUT_CHECK=".governance/scripts/overlord/check_stage6_closeout.py"
          fi

          if [ ! -f "$CLOSEOUT_CHECK" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Stage 6 closeout checker missing at ${CLOSEOUT_CHECK}."
            exit 1
          fi

          python3 "$CLOSEOUT_CHECK" \
            --root . \
            --branch-name "$BRANCH_NAME" \
            --changed-files-file /tmp/governance-changed-files.txt

      - name: Enforce issue execution scope for planner boundary
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            ASSERT_SCOPE="scripts/overlord/assert_execution_scope.py"
          else
            ASSERT_SCOPE=".governance/scripts/overlord/assert_execution_scope.py"
          fi

          if [ ! -f "$ASSERT_SCOPE" ]; then
            echo "::warning::Planner-boundary scope gate skipped: validator missing at ${ASSERT_SCOPE}."
            exit 0
          fi

          BOUNDARY_REGEX='^(CLAUDE\.md|README\.md|STANDARDS\.md|OVERLORD_BACKLOG\.md|docs/(DATA_DICTIONARY|FEATURE_REGISTRY|PROGRESS|SERVICE_REGISTRY)\.md|\.github/workflows/|\.github/scripts/|agents/|docs/schemas/|hooks/|launchd/|raw/(closeouts|cross-review|execution-scopes|gate|handoffs|model-fallbacks|operator-context|packets|validation)/|metrics/|scripts/(knowledge_base|lam|orchestrator|overlord|packet)/|wiki/|docs/plans/)'
          BOUNDARY_CHANGES="$(grep -E "$BOUNDARY_REGEX" /tmp/governance-changed-files.txt || true)"
          if [ -z "$BOUNDARY_CHANGES" ]; then
            echo "✓ No planner-boundary/governance-surface paths changed; execution-scope gate skipped"
            exit 0
          fi

          ISSUE_TOKEN="$(printf '%s\n' "$BRANCH_NAME" | grep -oE 'issue-[0-9]+' | head -n 1 || true)"
          ISSUE_NUMBER="${ISSUE_TOKEN#issue-}"
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::GOVERNANCE GATE FAILED: planner-boundary changes require an issue branch name like issue-<number>-... so CI can resolve raw/execution-scopes/*issue-<number>*implementation*.json (fallback: *planning*.json)."
            echo "Changed boundary paths:"
            echo "$BOUNDARY_CHANGES"
            exit 1
          fi

          if [ ! -d raw/execution-scopes ]; then
            echo "::error::GOVERNANCE GATE FAILED: planner-boundary changes detected but raw/execution-scopes/ is missing."
            echo "Add an issue-specific execution scope, e.g. raw/execution-scopes/*issue-${ISSUE_NUMBER}*implementation*.json."
            exit 1
          fi

          mapfile -t IMPLEMENTATION_SCOPES < <(find raw/execution-scopes -maxdepth 1 -type f -name "*issue-${ISSUE_NUMBER}*implementation*.json" | sort)
          mapfile -t PLANNING_SCOPES < <(find raw/execution-scopes -maxdepth 1 -type f -name "*issue-${ISSUE_NUMBER}*planning*.json" | sort)

          if [ "${#IMPLEMENTATION_SCOPES[@]}" -gt 1 ]; then
            echo "::error::GOVERNANCE GATE FAILED: multiple implementation execution scopes match issue-${ISSUE_NUMBER}."
            printf '  - %s\n' "${IMPLEMENTATION_SCOPES[@]}"
            echo "Keep one canonical implementation scope file per issue."
            exit 1
          fi

          if [ "${#PLANNING_SCOPES[@]}" -gt 1 ]; then
            echo "::error::GOVERNANCE GATE FAILED: multiple planning execution scopes match issue-${ISSUE_NUMBER}."
            printf '  - %s\n' "${PLANNING_SCOPES[@]}"
            echo "Keep one canonical planning scope fallback per issue."
            exit 1
          fi

          SCOPE_PATH=""
          if [ "${#IMPLEMENTATION_SCOPES[@]}" -eq 1 ]; then
            SCOPE_PATH="${IMPLEMENTATION_SCOPES[0]}"
          elif [ "${#PLANNING_SCOPES[@]}" -eq 1 ]; then
            SCOPE_PATH="${PLANNING_SCOPES[0]}"
          fi

          if [ -z "$SCOPE_PATH" ]; then
            echo "::error::GOVERNANCE GATE FAILED: planner-boundary changes detected but no issue-specific execution scope exists for issue-${ISSUE_NUMBER}."
            echo "Expected naming: raw/execution-scopes/*issue-${ISSUE_NUMBER}*implementation*.json (preferred) or *issue-${ISSUE_NUMBER}*planning*.json (fallback)."
            echo "Changed boundary paths:"
            echo "$BOUNDARY_CHANGES"
            exit 1
          fi

          BASE="${{ steps.diff_base.outputs.base_sha }}"
          if [ -z "$BASE" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          if [ -z "$BASE" ]; then
            echo "::error::GOVERNANCE GATE FAILED: unable to resolve base commit for trusted execution-scope validation."
            exit 1
          fi

          TRUSTED_SCOPE_PATH="$SCOPE_PATH"
          TRUSTED_SCOPE_TMP=""
          cleanup_trusted_scope() {
            if [ -n "$TRUSTED_SCOPE_TMP" ] && [ -f "$TRUSTED_SCOPE_TMP" ]; then
              rm -f "$TRUSTED_SCOPE_TMP"
            fi
          }
          trap cleanup_trusted_scope EXIT

          if grep -Fxq "$SCOPE_PATH" /tmp/governance-changed-files.txt; then
            echo "Execution scope changed in PR: ${SCOPE_PATH}"
            TRUSTED_SCOPE_TMP="$(mktemp "${TMPDIR:-/tmp}/trusted-execution-scope.XXXXXX.json")"
            if git show "${BASE}:${SCOPE_PATH}" > "$TRUSTED_SCOPE_TMP" 2>/dev/null; then
              TRUSTED_SCOPE_PATH="$TRUSTED_SCOPE_TMP"
              echo "Using trusted execution scope from base commit ${BASE}:${SCOPE_PATH}"
            else
              rm -f "$TRUSTED_SCOPE_TMP"
              TRUSTED_SCOPE_TMP=""

              NON_PLANNING_BOUNDARY_CHANGES="$(printf '%s\n' "$BOUNDARY_CHANGES" | grep -Ev '^(docs/plans/|raw/cross-review/|raw/execution-scopes/|OVERLORD_BACKLOG\.md$|docs/PROGRESS\.md$)' || true)"
              if [ -n "$NON_PLANNING_BOUNDARY_CHANGES" ]; then
                echo "::error::GOVERNANCE GATE FAILED: ${SCOPE_PATH} is new or modified in this PR and has no trusted base copy."
                echo "This PR also changes non-planning planner-boundary files, so strict execution-scope authorization cannot trust head-authored scope changes."
                echo "Action: merge the issue-specific execution scope in a planning-only PR first, then open a follow-up implementation PR."
                echo "Non-planning planner-boundary changes:"
                echo "$NON_PLANNING_BOUNDARY_CHANGES"
                exit 1
              fi

              echo "::notice::Planner-boundary strict execution-scope assertion skipped: ${SCOPE_PATH} is new/modified with no base copy, and boundary changes are planning-only artifacts."
              echo "Planning-only scope changes may proceed through structured-plan and cross-review gates."
              echo "Implementation file authorization must happen in a follow-up PR after that scope lands on base."
              exit 0
            fi
          fi

          echo "Using execution scope: ${TRUSTED_SCOPE_PATH}"
          ASSERT_ARGS=(
            --scope "$TRUSTED_SCOPE_PATH"
            --changed-files-file /tmp/governance-changed-files.txt
          )
          if [[ "$SCOPE_PATH" == *implementation*.json ]]; then
            ASSERT_ARGS+=(--require-lane-claim)
          fi
          python3 "$ASSERT_SCOPE" "${ASSERT_ARGS[@]}"

      # ── 2. PROGRESS.md co-staged with code changes ──
      - name: Check PROGRESS.md updated with code changes
        if: steps.changed.outputs.has_code == 'true'
        run: |
          if [ "${{ steps.changed.outputs.has_progress }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Source files changed but docs/PROGRESS.md was not updated."
            echo ""
            echo "Changed source files:"
            echo "${{ steps.changed.outputs.code_changes }}"
            echo ""
            echo "Rule: Every code/content change must be reflected in PROGRESS.md."
            exit 1
          fi
          echo "✓ PROGRESS.md updated alongside code changes"

      - name: Block product-repo graphify artifacts
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          CHANGED="${{ steps.changed.outputs.files }}"

          if [ "$REPO_NAME" = "hldpro-governance" ]; then
            echo "✓ Governance repo may track graphify artifacts"
            exit 0
          fi

          if echo "$CHANGED" | grep -qE '^graphify-out/'; then
            echo "::error::GOVERNANCE GATE FAILED: graphify-out/ changed in a product repo."
            echo ""
            echo "Rule: graphify artifacts are governance-hosted only. Product repos keep pointers/hooks, not tracked graphify-out files."
            echo "Move the graph output to hldpro-governance and keep only CLAUDE/.claude pointer changes in the product repo."
            exit 1
          fi

          echo "✓ No product-repo graphify artifact drift detected"

      # ── 2b. FEATURE_REGISTRY.md co-staged with code changes ──
      - name: Check FEATURE_REGISTRY.md updated with code changes
        if: steps.changed.outputs.has_code == 'true'
        run: |
          if [ "${{ steps.changed.outputs.has_feature_registry }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Source files changed but docs/FEATURE_REGISTRY.md was not updated."
            echo ""
            echo "Changed source files:"
            echo "${{ steps.changed.outputs.code_changes }}"
            echo ""
            echo "Rule: Every governed repo must co-stage docs/FEATURE_REGISTRY.md with source changes."
            exit 1
          fi
          echo "✓ FEATURE_REGISTRY.md updated alongside code changes"

      # ── 3. FAIL_FAST_LOG co-staged with bug fixes ──
      - name: Check FAIL_FAST_LOG.md updated with bug fixes
        if: steps.changed.outputs.has_code == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          IS_BUG_FIX=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if echo "$PR_TITLE" | grep -qiE 'fix|bug|patch|hotfix'; then
              IS_BUG_FIX="true"
            fi
          fi

          RANGE="${{ steps.diff_base.outputs.base_sha }}..HEAD"
          if git log --oneline "$RANGE" 2>/dev/null | grep -qiE 'fix|bug|patch|hotfix'; then
            IS_BUG_FIX="true"
          fi

          if [ "$IS_BUG_FIX" = "true" ] && [ "${{ steps.changed.outputs.has_failfast }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Bug fix detected but docs/FAIL_FAST_LOG.md was not updated."
            echo "Rule: Every bug fix must log the error pattern, root cause, and resolution."
            exit 1
          fi
          echo "✓ FAIL_FAST_LOG.md check passed"

      # ── 4. DATA_DICTIONARY co-staged with migrations ──
      - name: Check DATA_DICTIONARY.md updated with migrations
        if: steps.changed.outputs.has_migrations == 'true'
        run: |
          if [ "${{ steps.changed.outputs.has_datadict }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Migration file(s) changed but docs/DATA_DICTIONARY.md was not updated."
            echo "Rule: Every migration must update the DATA_DICTIONARY.md with new/modified table schemas."
            exit 1
          fi
          echo "✓ DATA_DICTIONARY.md updated alongside migrations"

      # ── 5. SERVICE_REGISTRY co-staged with new functions ──
      - name: Check SERVICE_REGISTRY.md updated with new functions
        if: steps.changed.outputs.has_functions == 'true'
        run: |
          if [ "${{ steps.changed.outputs.has_registry }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: New edge function(s) added but docs/SERVICE_REGISTRY.md was not updated."
            echo "Rule: Every new edge function must be added to SERVICE_REGISTRY.md."
            exit 1
          fi
          echo "✓ SERVICE_REGISTRY.md check passed"

      # ── 6. MARKETING_PAGE co-staged with marketing changes ──
      - name: Check MARKETING_PAGE.md updated with marketing changes
        if: steps.changed.outputs.has_marketing == 'true'
        run: |
          if [ "${{ steps.changed.outputs.has_marketing_doc }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: marketing/ files changed but marketing/MARKETING_PAGE.md was not updated."
            echo "Rule: Marketing page changes must be documented in MARKETING_PAGE.md."
            exit 1
          fi
          echo "✓ MARKETING_PAGE.md updated alongside marketing changes"

      # ── 7. Infrastructure changes → PROGRESS ──
      - name: Check infrastructure changes documented
        if: steps.changed.outputs.has_infra == 'true' && github.actor != 'dependabot[bot]'
        run: |
          if [ "${{ steps.changed.outputs.has_progress }}" != "true" ]; then
            echo "::error::GOVERNANCE GATE FAILED: Infrastructure files changed but docs/PROGRESS.md was not updated."
            echo "Rule: Infrastructure changes must be documented in PROGRESS.md."
            exit 1
          fi
          echo "✓ Infrastructure changes documented in PROGRESS.md"

      # ── 8. PENDING_ placeholder scan ──
      - name: Check for PENDING_ placeholders
        run: |
          BASE="${{ steps.diff_base.outputs.base_sha }}"

          PENDING_FILES=""
          for f in $(git diff --name-only "$BASE" HEAD | grep -E '\.(html|ts|tsx|js|json)$' || true); do
            if [ -f "$f" ] && grep -q 'PENDING_' "$f"; then
              PENDING_FILES="${PENDING_FILES}\n  - $f: $(grep -n 'PENDING_' "$f" | head -3)"
            fi
          done
          if [ -n "$PENDING_FILES" ]; then
            echo "::error::GOVERNANCE GATE FAILED: PENDING_ placeholders found in committed files:${PENDING_FILES}"
            echo "Rule: All PENDING_ placeholders must be replaced before merging."
            exit 1
          fi
          echo "✓ No PENDING_ placeholders found"

      # ── 9. Migration rollback comments (warning) ──
      - name: Check migration rollback comments
        if: steps.changed.outputs.has_migrations == 'true'
        run: |
          MISSING=""
          for f in $(echo "${{ steps.changed.outputs.files }}" | grep -E '\.sql$' | grep -iE 'migration'); do
            if [ -f "$f" ] && ! grep -q '-- ROLLBACK:' "$f"; then
              MISSING="${MISSING}\n  - $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::New migration(s) missing rollback comments:${MISSING}"
            echo "Add '-- ROLLBACK: <steps to undo>' to each migration file."
          else
            echo "✓ All new migrations have rollback comments"
          fi

      # ── 10. PROGRESS.md freshness (warning) ──
      - name: Check PROGRESS.md freshness
        run: |
          THIRTY_AGO=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          RECENT=$(grep -oE '20[0-9]{2}-[0-9]{2}-[0-9]{2}' docs/PROGRESS.md | sort -r | head -1 || echo "")
          if [ -z "$RECENT" ]; then
            echo "::warning::PROGRESS.md has no dates — consider adding timestamps to entries"
          elif [[ "$RECENT" < "$THIRTY_AGO" ]]; then
            echo "::warning::PROGRESS.md appears stale — most recent date is $RECENT (>30 days old)"
          else
            echo "✓ PROGRESS.md is fresh (most recent: $RECENT)"
          fi

      # ── 11. FAIL_FAST_LOG quality ──
      - name: Check FAIL_FAST_LOG.md content quality
        if: steps.changed.outputs.has_failfast == 'true'
        run: |
          BASE="${{ steps.diff_base.outputs.base_sha }}"
          DIFF=$(git diff "$BASE" HEAD -- docs/FAIL_FAST_LOG.md)
          EMPTY_COLS=$(echo "$DIFF" | grep '^+|' | grep -E '\| \||\|  \|' | grep -v '^+|---' | head -3)
          if [ -n "$EMPTY_COLS" ]; then
            echo "::error::FAIL_FAST_LOG.md has entries with empty columns. Every entry must have: Error | Root Cause | Resolution | Date"
            echo "$EMPTY_COLS"
            exit 1
          fi
          echo "✓ FAIL_FAST_LOG.md entries have complete columns"

      # ── 12. PROGRESS.md row count ──
      - name: Check PROGRESS.md row count
        if: steps.changed.outputs.has_progress == 'true'
        run: |
          BASE="${{ steps.diff_base.outputs.base_sha }}"
          OLD_COUNT=$(git show "${BASE}":docs/PROGRESS.md 2>/dev/null | grep -c '^|' || echo "0")
          NEW_COUNT=$(grep -c '^|' docs/PROGRESS.md || echo "0")
          if [ "$NEW_COUNT" -lt "$OLD_COUNT" ]; then
            DELTA=$(( OLD_COUNT - NEW_COUNT ))
            echo "::warning::PROGRESS.md lost $DELTA table rows ($OLD_COUNT → $NEW_COUNT). Verify entries weren't accidentally deleted."
          else
            echo "✓ PROGRESS.md row count: $OLD_COUNT → $NEW_COUNT"
          fi


      # -- SoM / Society-of-Minds governance checks --
      - name: Install Python deps for SoM checks
        run: python3 -m pip install --quiet pyyaml

      - name: Validate CLAUDE.md SoM pointer
        run: |
          set -euo pipefail
          if [ ! -f CLAUDE.md ]; then
            echo "::error file=CLAUDE.md,line=1::[check-claude-md-pointer] CLAUDE.md not found"
            exit 1
          fi
          if grep -Fq "STANDARDS.md" CLAUDE.md && grep -Fq "Society of Minds" CLAUDE.md; then
            exit 0
          fi
          if grep -Eq "NIBARGERB-HLDPRO/hldpro-governance/blob/main/STANDARDS\.md" CLAUDE.md; then
            exit 0
          fi
          echo "::error file=CLAUDE.md,line=1::[check-claude-md-pointer] CLAUDE.md must reference STANDARDS.md Society of Minds section or link to NIBARGERB-HLDPRO/hldpro-governance/blob/main/STANDARDS.md"
          exit 1

      - name: Validate agent model pins
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_agent_model_pins.py"

      - name: Validate codex exec model pinning
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_codex_model_pins.py"

      - name: Validate model fallback log schema
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_fallback_log_schema.py"

      - name: Validate cross-review model separation
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_no_self_approval.py"

      - name: Validate PII routing and audit evidence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_pii_routing.py"

      - name: Validate LAM worker ladder and Gemma shadow-only policy
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          python3 "$GOVSCRIPTS/check_lam_family_diversity.py"

      - name: Validate LAM health endpoint when required
        env:
          LAM_PROBE_URL: "http://host.docker.internal:8080/health"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"

          if [ -z "${BASE_SHA}" ] || [ -z "${HEAD_SHA}" ]; then
            echo "::warning::[check-lam-availability] Missing pull request context; skipping."
            exit 0
          fi

          DIFF_FILES="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          if [ -z "${DIFF_FILES}" ]; then
            echo "No diff files found."
            exit 0
          fi

          PII_LABEL=false
          SAFE_LABEL=false
          LABELS="$(python3 "$GOVSCRIPTS/check_lam_availability_labels.py")"

          case " $LABELS " in
            *" pii "*) PII_LABEL=true ;;
            *" pii-safe "*) SAFE_LABEL=true ;;
          esac

          TOUCH=false
          printf '%s\n' "${DIFF_FILES}" | grep -Eq '^scripts/lam/' && TOUCH=true || true
          if [ "${PII_LABEL}" = true ]; then
            TOUCH=true
          fi

          if [ "${TOUCH}" != true ]; then
            echo "[check-lam-availability] LAM not required for this PR."
            exit 0
          fi

          if [ "${SAFE_LABEL}" = true ]; then
            echo "[check-lam-availability] pii-safe label present; skipping hard fail on non-200."
            exit 0
          fi

          STATUS="$(curl -sS -o /tmp/lam-health.txt -w "%{http_code}" "${LAM_PROBE_URL}" || true)"
          if [ "${STATUS}" != "200" ]; then
            echo "::error file=.github/workflows/governance-check.yml::[check-lam-availability] LAM probe failed with HTTP ${STATUS} at ${LAM_PROBE_URL}"
            exit 1
          fi
          echo "[check-lam-availability] LAM probe OK (HTTP 200)."

      - name: Require cross-review artifact
        run: |
          set -euo pipefail
          GOVSCRIPTS=".governance/.github/scripts"
          [ -d "$GOVSCRIPTS" ] || GOVSCRIPTS=".github/scripts"
          GOVROOT=".governance"
          [ -d "$GOVROOT" ] || GOVROOT="."

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          if [ -z "${BASE_SHA}" ] || [ -z "${HEAD_SHA}" ]; then
            echo "::warning::[require-cross-review] Missing pull request context; skipping."
            exit 0
          fi

          DIFF_FILES="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          if [ -z "${DIFF_FILES}" ]; then
            echo "No diff files found."
            exit 0
          fi

          TOUCH=0
          REASONS=()
          if printf '%s\n' "${DIFF_FILES}" | grep -Eq '^STANDARDS\.md$|^docs/.*/[^/]*charter[^/]*\.md$|^docs/[^/]*charter[^/]*\.md$'; then
            TOUCH=1
            REASONS+=("STANDARDS.md or charter document changed")
          fi
          LABELS="$(python3 "$GOVSCRIPTS/get_pr_labels.py")"

          case " $LABELS " in
            *" architecture "*|*" standards "*)
              TOUCH=1
              REASONS+=("PR has architecture/standards label")
              ;;
          esac

          if [ "${TOUCH}" -ne 1 ]; then
            echo "Cross-review trigger not hit. Skipping."
            exit 0
          fi

          if [ "${#REASONS[@]}" -gt 0 ]; then
            echo "::notice file=raw/cross-review/::[require-cross-review] Cross-review enforced for this PR."
            for reason in "${REASONS[@]}"; do
              echo "  - $reason"
            done
          fi

          RAW_CROSS_REVIEW="$(printf '%s\n' "${DIFF_FILES}" | grep -E '^raw/cross-review/.*\.md$' | sort -u || true)"
          if [ -z "${RAW_CROSS_REVIEW}" ]; then
            echo "::error file=raw/cross-review/::[require-cross-review] Missing raw/cross-review/*.md file in PR diff."
            exit 1
          fi

          CROSS_FILE="$(printf '%s\n' "${RAW_CROSS_REVIEW}" | head -n 1)"

          bash "$GOVROOT/scripts/cross-review/require-dual-signature.sh" "${CROSS_FILE}"

      # ── Summary ──
      - name: Governance summary
        run: |
          echo "=== Governance Gate Summary ==="
          echo "Code changed: ${{ steps.changed.outputs.has_code }}"
          echo "Migrations changed: ${{ steps.changed.outputs.has_migrations }}"
          echo "Functions changed: ${{ steps.changed.outputs.has_functions }}"
          echo "Marketing changed: ${{ steps.changed.outputs.has_marketing }}"
          echo "Infrastructure changed: ${{ steps.changed.outputs.has_infra }}"
          echo "PROGRESS.md updated: ${{ steps.changed.outputs.has_progress }}"
          echo "FAIL_FAST_LOG.md updated: ${{ steps.changed.outputs.has_failfast }}"
          echo "DATA_DICTIONARY.md updated: ${{ steps.changed.outputs.has_datadict }}"
          echo "SERVICE_REGISTRY.md updated: ${{ steps.changed.outputs.has_registry }}"
          echo "MARKETING_PAGE.md updated: ${{ steps.changed.outputs.has_marketing_doc }}"
          echo "=== All governance checks passed ==="

      # ── Notify operator_context on failure ──
      - name: Report governance failure to operator_context
        if: failure()
        continue-on-error: true
        env:
          SB_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
          SB_SRK: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SB_SRK" ] || [ -z "$SB_ANON" ]; then
            echo "Supabase secrets not available — skipping notification"
            exit 0
          fi

          REPO="${{ github.repository }}"
          CONTENT="Governance gate FAILED in ${REPO}. Check Actions tab."

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://gyrtvzvazmvwiirnexls.supabase.co/functions/v1/memory-writer" \
            -H "Authorization: Bearer $SB_SRK" \
            -H "apikey: $SB_ANON" \
            -H "Content-Type: application/json" \
            -d "{\"contextType\":\"system_event\",\"subjectType\":\"system\",\"content\":\"$CONTENT\",\"sourceAgent\":\"governance-check-ci\",\"relevanceTags\":[\"governance\",\"gate-failure\"]}")
          echo "$RESPONSE"
